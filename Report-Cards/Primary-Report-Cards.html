<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primary Performance Report</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/toggle.css">
    <link rel="shortcut icon" href="./default001.jpg" type="image/x-icon">
        <script src="https://cdn.tailwindcss.com"></script>

  
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">

            <h1><img src="logo.png" alt="" class="logo"> Primary school Online Students Results 
                 <p> 🎓Track and manage student result slips with ease</p>
            </h1>
                       <!-- Toggle Button (just the icon button) -->
<button id="toggleBtn" class="fixed bottom-6 z-50 right-6 flex items-center justify-center w-16 h-16 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full shadow-lg">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
</button>

<!-- Modal wrapper (empty, JS will fill content) -->
<div id="linkModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900 bg-opacity-70 hidden ">
    <div id="modalContent" class="bg-white rounded-2xl p-6 md:p-8 shadow-2xl max-w-lg w-full transform h-[80vh]">
        <!-- JS will inject modal content here -->
    </div>
</div>
        </div>

        <div class="auth-section">
            <div id="user-info">Please sign in to access the system</div>

            <div id="grade-filter-notice" style="
    background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    text-align: center;
    margin: 10px 20px;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
">
    📚 Displaying students from Primary level Only...
</div>


            <div>
                <button id="google-sign-in-btn">🔐 Sign in with Google</button>
                <button id="sign-out-btn">🚪 Sign Out</button>
            </div>
           
             

        </div>




        <div class="controls">
            
            <div class="control-group">
                <label for="grade-filter">📚 Filter by Grade</label>
                <select id="grade-filter">
                    <option value="">All Grades</option>
                </select>
            </div>

            <div class="control-group">
                <label for="field-filter">📋 Missing Field</label>
                <select id="field-filter" disabled>
                    <option value="">Select Field...</option>
                </select>
            </div>

            <div class="control-group">
                <label for="search-input">🔍 Search Students</label>
                <input type="text" id="search-input" placeholder="Search by name, UPI, phone...">
            </div>

            <div class="control-group">
                <label for="items-per-page">📄 Items Per Page</label>
                <select id="items-per-page">
                    <option value="10">10 per page</option>
                    <option value="25">25 per page</option>
                    <option value="50">50 per page</option>
                    <option value="100">100 per page</option>
                </select>
            </div>
        </div>


        <div id="print-area">
           <div class="report-header">
               <div id="report-summary">No data loaded yet</div>
               <button class="export-btn" onclick="exportMissingDataToPdf()">📥 Export to PDF</button>
           </div>
           

            <div class="table-container">
                <table id="missing-data-table">
                    <thead>
                        <tr>
                        <th>SN</th>
                        <th>Grade</th>
                            <th>Student Name</th>
                            <th>Assessment No</th>
                            <th>UPI</th>
                            <th>Term</th>
                            <th id="missing-field-header">Missing Field Value</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 40px; color: #7f8c8d;">
                                Sign in to load student data
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-section">
                <div id="pagination-info"></div>
                <div id="pagination-controls"></div>
            </div>
        </div>
    </div>



    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onValue, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        window.firebaseImports = {
            initializeApp,
            getDatabase,
            ref,
            onValue,
            update,
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
            signOut,
            onAuthStateChanged
        };
    </script>

    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <!-- Your Application Script -->
<script src="./js/Primary-Report-Cards.js"></script>

    <script src="./js/Toggle.js"></script>
</body>
</html>
