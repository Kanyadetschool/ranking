      <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithCustomToken, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getDatabase, ref, set, onValue, remove, update,get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const sanitizedAppId = appId.replace(/\./g, '_');
        const customFirebaseConfig = {
            apiKey: "AIzaSyA_41WpdMjHJOU5s3gQ9aieIayZRvUoRLE",
            authDomain: "kanyadet-school-admin.firebaseapp.com",
            projectId: "kanyadet-school-admin",
            databaseURL: "https://kanyadet-school-admin-default-rtdb.firebaseio.com",
            storageBucket: "kanyadet-school-admin.firebasestorage.app",
            messagingSenderId: "409708360032",
            appId: "1:409708360032:web:a21d63e8cb5fa1ecabee05",
            measurementId: "G-Y4C0ZRRL52"
        };
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : customFirebaseConfig;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db, auth, userId = null;
        let studentsData = [];
        let currentPage = 1;
        let studentsPerPage = 10;

        const deleteGradeBtn = document.getElementById('delete-grade-btn');
        const studentsPerPageSelect = document.getElementById('students-per-page');
        const fileInput = document.getElementById('file-input');
        const manualForm = document.getElementById('manual-form');
        const addFieldBtn = document.getElementById('add-field-btn');
        const customFieldsContainer = document.getElementById('custom-fields-container');
        const dataDisplay = document.getElementById('data-display');
        const statusMessage = document.getElementById('status-message');
        const modal = document.getElementById('message-modal');
        const modalText = document.getElementById('modal-text');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const userIdDisplay = document.getElementById('user-id-display');
        const loader = document.getElementById('loader');
        const signInSection = document.getElementById('sign-in-section');
        const dataSection = document.getElementById('data-section');
        const signInGoogleBtn = document.getElementById('sign-in-google-btn');
        const signInFingerprintBtn = document.getElementById('sign-in-fingerprint-btn');
        const signOutBtn = document.getElementById('sign-out-btn');
        const excelUploadSection = document.getElementById('excel-upload-section');
        const manualEntrySection = document.getElementById('manual-entry-section');
        const printAllBtn = document.getElementById('print-all-btn');
        const gradeFilterSelect = document.getElementById('grade-filter-select');
        const printGradeBtn = document.getElementById('print-grade-btn');
        const printModal = document.getElementById('print-modal');
        const closePrintModalBtn = document.getElementById('close-print-modal-btn');
        const printExcelBtn = document.getElementById('print-excel-btn');
        const printWordBtn = document.getElementById('print-word-btn');
        const printPdfBtn = document.getElementById('print-pdf-btn');
        const searchInput = document.getElementById('search-input');
        const statsSection = document.getElementById('stats-section');
        const pdfModalBackdrop = document.getElementById('pdf-modal-backdrop');
        const pdfIframe = document.getElementById('pdf-iframe');
        const closePdfModalBtn = document.getElementById('close-pdf-modal-btn');
        const pdfModalStudentImage = document.getElementById('pdf-modal-student-image');
        const pdfModalStudentName = document.getElementById('pdf-modal-student-name');

        const showModal = (message) => {
            modalText.textContent = message;
            modal.classList.remove('hidden');
        };

        studentsPerPageSelect.addEventListener('change', (e) => {
            studentsPerPage = parseInt(e.target.value);
            currentPage = 1;
            const selectedGrade = gradeFilterSelect.value;
            const searchTerm = searchInput.value;

            if (selectedGrade) {
                const filteredStudents = studentsData.filter(student => student.Grade === selectedGrade);
                renderStudents(filteredStudents, { field: 'Grade', value: selectedGrade });
            } else if (searchTerm) {
                const searchTermLower = searchTerm.toLowerCase();
                const filteredStudents = studentsData.filter(student => 
                    Object.values(student).some(value => 
                        String(value).toLowerCase().includes(searchTermLower)
                    )
                );
                renderStudents(filteredStudents, { field: 'Search', value: searchTerm });
            } else {
                renderStudents(studentsData);
            }
        });

        closeModalBtn.addEventListener('click', () => {
            modal.classList.add('hidden');
        });

        printAllBtn.addEventListener('click', () => {
            gradeFilterSelect.value = '';
            printModal.classList.remove('hidden');
        });

        printGradeBtn.addEventListener('click', () => {
            printModal.classList.remove('hidden');
        });

        closePrintModalBtn.addEventListener('click', () => {
            printModal.classList.add('hidden');
        });

        closePdfModalBtn.addEventListener('click', () => {
            pdfModalBackdrop.classList.add('hidden');
            pdfModalBackdrop.classList.remove('flex');
            pdfIframe.src = '';
            pdfModalStudentImage.src = '';
            pdfModalStudentName.textContent = '';
        });

        const signInWithGoogle = async () => {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Error during Google sign-in:", error);
                showModal(`Failed to sign in with Google: ${error.message}`);
            }
        };

        const signInWithFingerprint = async () => {
            if (!window.PublicKeyCredential) {
                showModal("Fingerprint authentication not supported on this device or browser.");
                return;
            }
            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);

                let credential;
                try {
                    credential = await navigator.credentials.get({
                        publicKey: {
                            challenge: challenge,
                            rpId: window.location.hostname,
                            userVerification: 'required',
                        }
                    });
                } catch (e) {
                    credential = await navigator.credentials.create({
                        publicKey: {
                            challenge: challenge,
                            rp: {
                                name: "Student Data Uploader",
                                id: window.location.hostname,
                            },
                            user: {
                                id: new Uint8Array(16),
                                name: "webauthn-user",
                                displayName: "WebAuthn User",
                            },
                            pubKeyCredParams: [{
                                type: "public-key",
                                alg: -7
                            }],
                            timeout: 60000,
                            attestation: "direct"
                        }
                    });
                }
                showModal("Successfully authenticated with fingerprint!");
                const credentialId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
                await signInWithCustomToken(auth, credentialId);
            } catch (error) {
                console.error("Error during fingerprint sign-in:", error);
                showModal(`Fingerprint authentication failed: ${error.message}`);
            }
        };

        const signOutUser = async () => {
            try {
                await signOut(auth);
                showModal("You have been signed out.");
            } catch (error) {
                console.error("Error during sign-out:", error);
                showModal("Failed to sign out. Check console for details.");
            }
        };

        if (signInGoogleBtn) {
            signInGoogleBtn.addEventListener('click', signInWithGoogle);
        }
        if (signInFingerprintBtn) {
            signInFingerprintBtn.addEventListener('click', signInWithFingerprint);
        }
        signOutBtn.addEventListener('click', signOutUser);

        const setupFirebase = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getDatabase(app);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        console.log("Authenticated with user ID:", userId);
                        const email = user.email;
                        let username = email.split("@")[0];
                        username = username.replace(/[^a-zA-Z]/g, "");
                        let spacedName = username.replace(/([a-z])([A-Z])/g, '$1 $2');
                        spacedName = spacedName.replace(/\b\w/g, char => char.toUpperCase());
                        userIdDisplay.textContent = `${spacedName}`;

                        if (user.photoURL) {
                            const userImg = document.createElement("img");
                            userImg.src = user.photoURL;
                            userImg.alt = "User profile picture";
                            userImg.style.width = "50px";
                            userImg.style.height = "50px";
                            userImg.style.borderRadius = "50%";
                            userIdDisplay.insertAdjacentElement("beforebegin", userImg);
                        }

                        signInSection.classList.add('hidden');
                        dataSection.classList.remove('hidden');

                        const studentsRef = ref(db, `DeletedResults/${sanitizedAppId}/artifacts/`);
                        onValue(studentsRef, (snapshot) => {
                            const students = [];
                            const data = snapshot.val();
                            if (data) {
                                for (let key in data) {
                                    students.push({ id: key, ...data[key] });
                                }
                            }
                            students.sort((a, b) => {
                                const assessmentNoA = parseFloat(a['Assessment No']) || Infinity;
                                const assessmentNoB = parseFloat(b['Assessment No']) || Infinity;
                                return assessmentNoA - assessmentNoB;
                            });
                            studentsData = students;
                            currentPage = 1;

        const readFileAsArrayBuffer = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsArrayBuffer(file);
            });
        };

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            statusMessage.textContent = 'Processing file...';
            statusMessage.classList.remove('hidden');
            loader.classList.remove('hidden');

            try {
                const data = await readFileAsArrayBuffer(file);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonRows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                if (jsonRows.length < 2) {
                    throw new Error("File must contain a header row and at least one data row.");
                }

                const headers = jsonRows[0].map(h => String(h).trim());
                const studentData = jsonRows.slice(1);

                if (!headers.includes("Assessment No")) {
                    throw new Error("Excel file must have a column titled 'Assessment No'.");
                }
                const assessmentNoIndex = headers.indexOf("Assessment No");

                const studentsRef = ref(db, `DeletedResults/${sanitizedAppId}/artifacts/`);
                for (const row of studentData) {
                    const assessmentNo = row[assessmentNoIndex];
                    if (!assessmentNo) {
                        console.warn("Skipping row with missing 'Assessment No'.");
                        continue;
                    }
                    const studentDocKey = String(assessmentNo);
                    const studentObj = {};
                    headers.forEach((header, index) => {
                        studentObj[header] = row[index];
                    });
                    await set(ref(db, `DeletedResults/${sanitizedAppId}/artifacts/${studentDocKey}`), studentObj);
                }

                statusMessage.textContent = 'Data uploaded successfully!';
                statusMessage.classList.remove('text-red-500');
                statusMessage.classList.add('text-green-500');
            } catch (e) {
                console.error("Error processing file:", e);
                statusMessage.textContent = `Error: ${e.message}`;
                statusMessage.classList.remove('text-green-500');
                statusMessage.classList.add('text-red-500');
            } finally {
                fileInput.value = '';
                loader.classList.add('hidden');
            }
        });

                        ? studentsData.filter(student => 
                            Object.values(student).some(value => 
                                String(value).toLowerCase().includes(activeFilter.value.toLowerCase())
                            )
                        )
                        : students;
                    renderStudents(filteredStudents, activeFilter);
                }
            });
            paginationContainer.appendChild(prevButton);

            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageButton = document.createElement('button');
                pageButton.textContent = i;
                pageButton.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                pageButton.addEventListener('click', () => {
                    currentPage = i;
                    const filteredStudents = activeFilter && activeFilter.field === 'Grade' 
                        ? studentsData.filter(student => student.Grade === activeFilter.value)
                        : activeFilter && activeFilter.field === 'Search'
                        ? studentsData.filter(student => 
                            Object.values(student).some(value => 
                                String(value).toLowerCase().includes(activeFilter.value.toLowerCase())
                            )
                        )
                        : students;
                    renderStudents(filteredStudents, activeFilter);
                });
                paginationContainer.appendChild(pageButton);
            }

            const nextButton = document.createElement('button');
            nextButton.textContent = 'Next';
            nextButton.className = 'pagination-btn';
            nextButton.disabled = currentPage === totalPages;
            nextButton.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    const filteredStudents = activeFilter && activeFilter.field === 'Grade' 
                        ? studentsData.filter(student => student.Grade === activeFilter.value)
                        : activeFilter && activeFilter.field === 'Search'
                        ? studentsData.filter(student => 
                            Object.values(student).some(value => 
                                String(value).toLowerCase().includes(activeFilter.value.toLowerCase())
                            )
                        )
                        : students;
                    renderStudents(filteredStudents, activeFilter);
                }
            });
            paginationContainer.appendChild(nextButton);

            return paginationContainer;
        };

        const getOrderedHeaders = (students) => {
            const allKeys = new Set();
            students.forEach(student => {
                Object.keys(student).forEach(key => allKeys.add(key));
            });
            const priorityHeaders = ['Grade', 'Assessment No', 'Official Student Name', 'UPI', 'Gender'];
            const otherHeaders = Array.from(allKeys)
                .filter(key => key !== 'id' && !priorityHeaders.includes(key))
                .sort();
            return ['Image', ...priorityHeaders, ...otherHeaders];
        };

     
window.openLocalPDF = function(assessmentNo, studentName) {
    const pdfPath = `https://kanyadet-school-admin.web.app/New-Students-Database/birth_certificates/${assessmentNo}.pdf`; // Replace with your server URL
    const imagePath = studentName 
        ? `https://kanyadet-school-admin.web.app/New-Students-Database/student_images/${encodeURIComponent(studentName)}.jpg` 
        : 'https://kanyadet-school-admin.web.app/New-Students-Database/student_images/default.jpg'; // Replace with your server URL
    const googleDocsUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfPath)}&embedded=true`;

    try {
        // Validate DOM elements
        if (!pdfIframe || !pdfModalStudentImage || !pdfModalStudentName || !pdfModalBackdrop) {
            throw new Error('Required DOM elements are missing');
        }

        // Set iframe source to Google Docs Viewer
        pdfIframe.src = googleDocsUrl;
        console.log('Iframe src set for all devices:', googleDocsUrl);

        // Set student image and name
        pdfModalStudentImage.src = imagePath;
        pdfModalStudentName.textContent = studentName || 'Unknown Student';

        // Show modal
        pdfModalBackdrop.classList.remove('hidden');
        pdfModalBackdrop.classList.add('flex');

        // Add outside click handler for modal
        const closeModalOnOutsideClick = function(event) {
            if (event.target === pdfModalBackdrop) {
                pdfModalBackdrop.classList.add('hidden');
                pdfModalBackdrop.classList.remove('flex');
                pdfIframe.src = ''; // Clear iframe source
                pdfModalBackdrop.removeEventListener('click', closeModalOnOutsideClick);
            }
        };
        
        pdfModalBackdrop.addEventListener('click', closeModalOnOutsideClick);

    } catch (e) {
        console.error("Error opening PDF:", e);
        showModal(`Failed to open birth certificate: ${e.message}. Ensure the file exists at ${pdfPath}`);
    }
};



        const renderStudents = (students, activeFilter = null) => {
            dataDisplay.innerHTML = '';
            updateAnalyticsDashboard(students, activeFilter);

            if (students.length === 0 && studentsData.length > 0) {
                dataDisplay.innerHTML = '<div class="bg-white p-8 rounded-lg shadow-md text-center"><p class="text-gray-500 italic">No student data found for this selection.</p></div>';
                const paginationContainer = renderPagination(students.length, students, activeFilter);
                dataDisplay.appendChild(paginationContainer);
                return;
            } else if (studentsData.length === 0) {
                dataDisplay.innerHTML = '<div class="bg-white p-8 rounded-lg shadow-md text-center"><p class="text-gray-500 italic">No student data has been uploaded yet.</p></div>';
                return;
            }

            const startIndex = (currentPage - 1) * studentsPerPage;
            const endIndex = startIndex + studentsPerPage;
            const paginatedStudents = students.slice(startIndex, endIndex);

            const headers = getOrderedHeaders(students);

            const table = document.createElement('table');
            table.id = 'student-table';
            table.className = "min-w-full bg-white rounded-lg shadow-md overflow-hidden";
            let tableHTML = `<thead class="bg-gray-100"><tr>`;
            headers.forEach(header => {
                tableHTML += `<th class="py-3 px-4 text-left font-semibold text-gray-700">${header}</th>`;
            });
            tableHTML += `<th class="py-3 px-4 text-left font-semibold text-gray-700">Actions</th></tr></thead>`;
            tableHTML += `<tbody class="divide-y divide-gray-200">`;

            paginatedStudents.forEach(student => {
                tableHTML += `
                    <tr id="row-${student.id}" class="cursor-pointer" data-id="${student.id}" onclick="if(!event.target.closest('.action-buttons') && !event.target.classList.contains('student-image')) openLocalPDF('${student['Assessment No']}', '${student['Official Student Name'] || ''}')">
                `;
                headers.forEach(header => {
                    if (header === 'Image') {
                        const imageName = student['Official Student Name'] ? encodeURIComponent(student['Official Student Name']) : '';
                        const imagePath = imageName ? `./student_images/${imageName}.jpg` : './student_images/default.jpg';
                        tableHTML += `
                            <td class="py-3 px-4 whitespace-nowrap text-sm text-gray-600" data-header="Image">
                                <img src="${imagePath}" alt="${student['Official Student Name'] || 'Student Image'}" class="student-image" onerror="this.src='./student_images/default.jpg';this.alt='Default Image'">
                            </td>`;
                    } else {
                        const value = student[header] !== undefined ? student[header] : '-';
                        tableHTML += `<td class="py-3 px-4 whitespace-nowrap text-sm text-gray-600" data-header="${header}">${value}</td>`;
                    }
                });
                tableHTML += `
                    <td class="py-2 px-4 whitespace-nowrap flex items-center space-x-2 action-buttons">
                        <button onclick="editStudent('${student.id}')" class="edit-btn p-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors duration-300">Edit</button>
                        <button onclick="deleteStudent('${student.id}')" class="delete-btn p-2 bg-red-500 text-white rounded-md hover:bg-red-600 transition-colors duration-300">Delete</button>
                        <button onclick="undoStudent('${student.id}')" class="undo-btn p-2 bg-green-500 text-white rounded-md hover:bg-green-600 transition-colors duration-300">Undo</button>

                    </td>
                `;
                tableHTML += `</tr>`;
            });

            tableHTML += `</tbody>`;
            table.innerHTML = tableHTML;
            dataDisplay.appendChild(table);

            const paginationContainer = renderPagination(students.length, students, activeFilter);
            dataDisplay.appendChild(paginationContainer);
        };

        
        window.editStudent = (id) => {
            const row = document.getElementById(`row-${id}`);
            if (!row) return;

            row.classList.add('no-hover');

            const currentValues = {};
            const cells = row.querySelectorAll('td[data-header]');
            cells.forEach(cell => {
                const header = cell.getAttribute('data-header');
                if (header !== 'Image') {
                    const value = cell.textContent;
                    currentValues[header] = value;
                    cell.innerHTML = `<input type="text" class="w-full bg-gray-200 border rounded-md p-1 focus:outline-none focus:ring-2 focus:ring-red-500" value="${value === '-' ? '' : value}" data-field-name="${header}">`;
                }
            });
            row.dataset.currentValues = JSON.stringify(currentValues);

            const actionButtons = row.querySelector('.action-buttons');
            actionButtons.innerHTML = `
                <button onclick="saveStudent('${id}')" class="p-2 bg-green-500 text-white rounded-md hover:bg-green-600 transition-colors duration-300">Save</button>
                <button onclick="cancelEdit('${id}')" class="p-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 transition-colors duration-300">Cancel</button>
            `;
            row.removeAttribute('onclick');
        };

        window.saveStudent = async (id) => {
            const row = document.getElementById(`row-${id}`);
            if (!row) {
                showModal('Error: Student row not found.');
                return;
            }

            const updatedData = {};
            const inputFields = row.querySelectorAll('input[type="text"]');
            inputFields.forEach(input => {
                const fieldName = input.dataset.fieldName;
                updatedData[fieldName] = input.value.trim();
            });

            if (!updatedData['Assessment No']) {
                showModal('The "Assessment No" field cannot be empty.');
                return;
            }

            try {
                const studentRef = ref(db, `DeletedResults/${sanitizedAppId}/artifacts/${id}`);
                await update(studentRef, updatedData);
                showModal('Student record updated successfully!');

                const studentIndex = studentsData.findIndex(student => student.id === id);
                if (studentIndex !== -1) {
                    studentsData[studentIndex] = { id, ...updatedData };
                }

                const selectedGrade = gradeFilterSelect.value;
                const searchTerm = searchInput.value;
                let filteredStudents = studentsData;
                if (selectedGrade) {
                    filteredStudents = studentsData.filter(student => student.Grade === selectedGrade);
                    renderStudents(filteredStudents, { field: 'Grade', value: selectedGrade });
                } else if (searchTerm) {
                    const searchTermLower = searchTerm.toLowerCase();
                    filteredStudents = studentsData.filter(student => 
                        Object.values(student).some(value => 
                            String(value).toLowerCase().includes(searchTermLower)
                        )
                    );
                    renderStudents(filteredStudents, { field: 'Search', value: searchTerm });
                } else {
                    renderStudents(studentsData);
                }
            } catch (e) {
                console.error("Error updating student:", e);
                showModal(`Error updating record: ${e.message}. Check Firebase rules and network.`);
            }
        };

        window.cancelEdit = (id) => {
            const row = document.getElementById(`row-${id}`);
            if (!row) return;

            row.classList.remove('no-hover');

            const originalValues = JSON.parse(row.dataset.currentValues || '{}');
            const cells = row.querySelectorAll('td[data-header]');
            cells.forEach(cell => {
                const header = cell.getAttribute('data-header');
                if (header === 'Image') {
                    const imageName = originalValues['Official Student Name'] ? encodeURIComponent(originalValues['Official Student Name']) : '';
                    const imagePath = imageName ? `./student_images/${imageName}.jpg` : './student_images/default.jpg';
                    cell.innerHTML = `<img src="${imagePath}" alt="${originalValues['Official Student Name'] || 'Student Image'}" class="student-image" onerror="this.src='./student_images/default.jpg';this.alt='Default Image'">`;
                } else {
                    cell.textContent = originalValues[header] || '-';
                }
            });

            const actionButtons = row.querySelector('.action-buttons');
            actionButtons.innerHTML = `
                <button onclick="editStudent('${id}')" class="edit-btn p-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors duration-300">Edit</button>
                <button onclick="deleteStudent('${id}')" class="delete-btn p-2 bg-red-500 text-white rounded-md hover:bg-red-600 transition-colors duration-300">Delete</button>
                <button onclick="undoStudent('${id}')" class="undo-btn p-2 bg-green-500 text-white rounded-md hover:bg-green-600 transition-colors duration-300">Undo</button>

            `;
            row.setAttribute('onclick', `if(!event.target.closest('.action-buttons') && !event.target.classList.contains('student-image')) openLocalPDF('${originalValues['Assessment No']}', '${originalValues['Official Student Name'] || ''}')`);
        };

     
window.deleteStudent = async (id) => {
    if (!confirm('Are you sure you want to delete this student record? This action cannot be undone.')) {
        return;
    }

    try {
        const studentRef = ref(db, `DeletedResults/${sanitizedAppId}/artifacts/${id}`);
        const deletedStudentRef = ref(db, `DeletedResults/${sanitizedAppId}/artifacts/${id}`);

        const snapshot = await get(studentRef);
        if (snapshot.exists()) {
            const studentData = snapshot.val();
            const userEmail = auth.currentUser ? auth.currentUser.email : 'unknown';
            await set(deletedStudentRef, {
                ...studentData,
                deletedAt: new Date().toISOString(),
                deletedBy: userEmail // Add the user's email to the deleted record
            });
        }

        await remove(studentRef);
        showModal('Student record deleted successfully and moved to DeletedResults.');
        // Remove totalStudents-- and replace fetchAndRenderStudents with renderStudents
        renderStudents(studentsData);
    } catch (e) {
        console.error("Error deleting student:", e);
        showModal(`Error deleting record: ${e.message}. Check Firebase rules and network.`);
    }
};



     window.undoStudent = async (id) => {
    if (!confirm('Are you sure you want to undo the deletion of this student record? This will restore it to the main database.')) {
        return;
    }
    try {
        const deletedStudentRef = ref(db, `DeletedResults/${sanitizedAppId}/artifacts/${id}`);
        const studentRef = ref(db, `Results/${sanitizedAppId}/students/${id}`);

        // Use 'get' for a one-time read (returns a promise with DataSnapshot)
        const snapshot = await get(deletedStudentRef);

        // Check if data exists
        if (!snapshot.exists()) {
            showModal('Error: Student data not found in deleted records.');
            return;
        }

        const studentData = snapshot.val();

        // Restore to main database
        await set(studentRef, studentData);

        // Remove from deleted records
        await remove(deletedStudentRef);

        showModal('Student record restored successfully.');

        // Update local data and re-render
        studentsData = studentsData.filter(student => student.id !== id);
        currentPage = Math.min(currentPage, Math.ceil(studentsData.length / studentsPerPage)) || 1;
        const selectedGrade = gradeFilterSelect.value;
        const searchTerm = searchInput.value;
        let filteredStudents = studentsData;
        if (selectedGrade) {
            filteredStudents = studentsData.filter(student => student.Grade === selectedGrade);
            renderStudents(filteredStudents, { field: 'Grade', value: selectedGrade });
        } else if (searchTerm) {
            const searchTermLower = searchTerm.toLowerCase();
            filteredStudents = studentsData.filter(student => 
                Object.values(student).some(value => 
                    String(value).toLowerCase().includes(searchTermLower)
                )
            );
            renderStudents(filteredStudents, { field: 'Search', value: searchTerm });
        } else {
            renderStudents(studentsData);
        }
    } catch (e) {
        console.error("Error undoing student deletion:", e);
        showModal(`Error restoring record: ${e.message}. Check Firebase rules and network.`);
    }
};

});

        const exportToExcel = () => {
            const selectedGrade = gradeFilterSelect.value;
            const dataToExport = selectedGrade ? studentsData.filter(s => s.Grade === selectedGrade) : studentsData;

            if (dataToExport.length === 0) {
                showModal('No data to export.');
                return;
            }

            const headers = getOrderedHeaders(dataToExport).filter(header => header !== 'Image');
            const formattedData = dataToExport.map(student => {
                const row = {};
                headers.forEach(header => {
                    row[header] = student[header] !== undefined ? student[header] : '';
                });
                return row;
            });

            const worksheet = XLSX.utils.json_to_sheet(formattedData, { header: headers });
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Students");
            XLSX.writeFile(workbook, `student_data_${selectedGrade || 'all'}.xlsx`);
            printModal.classList.add('hidden');
        };

        const exportToPdf = async () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const selectedGrade = gradeFilterSelect.value;
            const dataToExport = selectedGrade ? studentsData.filter(s => s.Grade === selectedGrade) : studentsData;
            const title = `Student Data (${selectedGrade || 'All Grades'})`;
            doc.text(title, 14, 16);

            if (dataToExport.length === 0) {
                showModal('No data to export.');
                return;
            }

            const headers = getOrderedHeaders(dataToExport).filter(header => header !== 'Image');
            const body = dataToExport.map(student => 
                headers.map(header => String(student[header] || '-'))
            );

            doc.autoTable({
                head: [headers],
                body: body,
                startY: 25,
                styles: { fontSize: 8, cellPadding: 2 },
                headStyles: { fillColor: [200, 200, 200], textColor: [0, 0, 0] },
                alternateRowStyles: { fillColor: [245, 245, 245] },
            });

            doc.save(`student_data_${selectedGrade || 'all'}.pdf`);
            printModal.classList.add('hidden');
        };

        const exportToWord = () => {
            const { Document, Packer, Paragraph, Table, TableCell, TableRow } = window.docx;

            const selectedGrade = gradeFilterSelect.value;
            const dataToExport = selectedGrade ? studentsData.filter(s => s.Grade === selectedGrade) : studentsData;

            if (dataToExport.length === 0) {
                showModal('No data to export.');
                return;
            }

            const headers = getOrderedHeaders(dataToExport).filter(header => header !== 'Image');
            const headerRow = new TableRow({
                children: headers.map(header => new TableCell({ 
                    children: [new Paragraph({ text: header, bold: true })] 
                })),
            });

            const dataRows = dataToExport.map(student => {
                return new TableRow({
                    children: headers.map(header => new TableCell({ 
                        children: [new Paragraph(String(student[header] || '-'))] 
                    })),
                });
            });

            const table = new Table({
                rows: [headerRow, ...dataRows],
            });

            const doc = new Document({
                sections: [{
                    children: [
                        new Paragraph({ 
                            text: `Student Data (${selectedGrade || 'All Grades'})`, 
                            heading: 'Heading1',
                            alignment: 'center'
                        }),
                        new Paragraph({ text: '' }),
                        table,
                    ],
                }],
            });

            Packer.toBlob(doc).then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `student_data_${selectedGrade || 'all'}.docx`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            printModal.classList.add('hidden');
        };

        printExcelBtn.addEventListener('click', exportToExcel);
        printPdfBtn.addEventListener('click', exportToPdf);
        printWordBtn.addEventListener('click', exportToWord);

        window.onload = setupFirebase;
    </script>
